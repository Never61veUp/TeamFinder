version: "3.9"

services:
  teamfinder-api:
    container_name: teamfinder-api
    build:
      context: .
      dockerfile: TeamFinder.API/Dockerfile
    environment:
      DP_KEYS_FOLDER: "/keys"
      Telegram__BotToken: "${TELEGRAM_BOT_TOKEN}"
      JWT_KEY: "${JWT_KEY}"
      JWT_ISSUER: "MiniApp"
      JWT_AUDIENCE: "MiniApp"
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ENABLE_DEV_AUTH: "${ENABLE_DEV_AUTH}"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      RUN_MIGRATIONS: "true"
      GitHub__ClientId: "${GITHUB_CLIENT_ID}"
      GitHub__ClientSecret: "${GITHUB_CLIENT_SECRET}"
    volumes:
      - teamfinder-keys:/keys
    labels:
      - traefik.enable=true
      - traefik.http.routers.teamfinder-api.rule=Host(`api.teamfinder.mixdev.me`)
      - traefik.http.routers.teamfinder-api.entrypoints=https
      - traefik.http.routers.teamfinder-api.tls.certresolver=letsencrypt
      - traefik.http.services.teamfinder-api.loadbalancer.server.port=8080

  client:
    build:
      context: ../miniapp
      dockerfile: Dockerfile
    depends_on:
      - teamfinder-api
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.client.rule=Host(`teamfinder.mixdev.me`)
      - traefik.http.routers.client.entrypoints=https
      - traefik.http.routers.client.tls.certresolver=letsencrypt
      - traefik.http.services.client.loadbalancer.server.port=80
  
  postgres:
    image: postgres:18.3
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  teamfinder-keys:
  postgres_data: